[project]
name = "adrar-kernel"
version = "0.1.0"
description = "Pure deterministic emissions calculation kernel — no network, no LLM, no I/O."
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/adrar_kernel"]
