name: Adrar AI — CI

on:
  push:
    branches: [master, "claude/**"]
  pull_request:
    branches: [master]

jobs:
  # ── Python tests ──────────────────────────────────────────────────────────
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python deps
        run: |
          pip install --quiet -e packages/kernel
          pip install --quiet -e "apps/api[dev]"

      - name: Run kernel tests
        env:
          ADRAR_TESTING: "1"
        run: pytest packages/kernel/tests -q

  # ── TypeScript / Next.js type check ──────────────────────────────────────
  web-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install deps
        working-directory: apps/web
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Type check
        working-directory: apps/web
        run: npx tsc --noEmit
